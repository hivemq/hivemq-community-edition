name: Validation

on:
  push:

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    name: Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout HiveMQ Community Edition
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6
        with:
          gradle-home-cache-includes: |
            caches
            notifications
            jdks

      - name: Check approved licenses
        run: ./gradlew checkApprovedLicenses

      - name: Check forbidden APIs
        run: ./gradlew forbiddenApis

      - name: Check code formatting
        run: ./gradlew spotlessCheck
